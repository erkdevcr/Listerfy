<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Listerfy</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#34b080"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Listerfy"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="icon" type="image/svg+xml" href="logo.svg"/>
  <style>
    #progress-track-bar { background: #404040; }           /* oscuro: gris más oscuro */
    body.light #progress-track-bar { background: #ede8e8; } /* claro: gris más claro */
  </style>
  <style>
    /* Breathing suave en el logo de carga */
    @keyframes spinner-breathe {
      0%, 100% { transform: scale(1);     opacity: 0.7; }
      50%       { transform: scale(1.09); opacity: 1;   }
    }
    .spinner-brand svg { animation: spinner-breathe 0.9s ease-in-out infinite; }

    /* Nav tabs: activo verde, inactivo gris */
    .nav-tab { color: var(--text-3) !important; }
    .nav-tab .nav-icon svg { fill: var(--text-3) !important; color: var(--text-3) !important; }
    .nav-tab.active { color: var(--brand) !important; }
    .nav-tab.active .nav-icon svg { fill: var(--brand) !important; color: var(--brand) !important; }
  </style>
</head>
<body>
<div class="page">
  <!-- Topbar -->
  <div class="topbar" id="topbar">
    <button class="topbar-back" id="back-btn" onclick="location.href='app.html'" style="padding:0 8px 2px 0;line-height:1;display:flex;align-items:center;"><svg viewBox="0 0 492 492" xmlns="http://www.w3.org/2000/svg" fill="currentColor" width="26" height="26"><path d="M7.86,265.12l177.68,177.68c5.07,5.07,11.83,7.86,19.04,7.86s13.97-2.79,19.04-7.86l16.13-16.14c5.07-5.06,7.86-11.83,7.86-19.04s-2.79-14.2-7.86-19.26l-103.66-103.88h329.32c14.85,0,26.58-11.62,26.58-26.48v-22.81c0-14.85-11.73-27.65-26.58-27.65H134.93l104.83-104.46c5.07-5.07,7.86-11.65,7.86-18.86s-2.79-13.88-7.86-18.95l-16.13-16.08c-5.07-5.07-11.83-7.84-19.04-7.84s-13.97,2.8-19.04,7.87L7.86,226.9C2.78,231.99-.02,238.78,0,246c-.02,7.24,2.78,14.04,7.86,19.12Z"/></svg></button>
    <span class="topbar-title truncate" id="list-title">…</span>
    <div class="topbar-actions" id="topbar-actions"></div>
  </div>

  <!-- Progress bar under topbar -->
  <div id="progress-track-bar" style="height:3px;border-radius:9999px;overflow:hidden">
    <div id="top-progress" style="height:100%;background:var(--brand);width:0%;transition:width .4s ease"></div>
  </div>

  <div class="page-content" id="page-content">
    <div class="empty-state"><div class="spinner spinner-brand"><svg viewBox="0 0 377.87 347.58" xmlns="http://www.w3.org/2000/svg" width="56" height="56" fill="#34b080"><path d="M154.2,211.57c-35.21-34.4-68.39-71.02-103.88-105.16l96.8,173.21c5.26,9.01,18.37,10.12,25.07,2.13L377.87,9.71c-.29,2.45-1.62,4.98-2.6,7.27-12.8,30.03-27.84,59.22-40.8,89.19,28.97,70.14,9.77,151.17-47.84,200.13-82.99,70.53-209.83,47.79-263.68-46.2C-24.9,176.57,4.67,70.26,87.56,22.79,163.68-20.82,262.52-.2,313.73,70.67l-154.51,144.37c-2.46,1.18-3.6-2.07-5.03-3.47Z"/></svg></div></div>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <button class="nav-tab active" onclick="location.href='app.html'">
      <span class="nav-icon"><svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" fill="currentColor" width="26" height="26"><path d="M134.4,345.6c-8.53,0-14.93,6.4-14.93,14.93s6.4,14.93,14.93,14.93,14.93-6.4,14.93-14.93-6.4-14.93-14.93-14.93Z"/><path d="M134.4,238.93c-8.53,0-14.93,6.4-14.93,14.93s6.4,14.93,14.93,14.93,14.93-6.4,14.93-14.93c0-10.67-6.4-14.93-14.93-14.93Z"/><path d="M256,0C114.62,0,0,114.62,0,256s114.62,256,256,256,256-114.62,256-256S397.38,0,256,0ZM134.4,405.33c-25.6,0-46.93-19.2-46.93-46.93,0-25.6,19.2-46.93,46.93-46.93s46.93,19.2,46.93,46.93c-2.13,27.73-21.33,46.93-46.93,46.93ZM134.4,298.67c-25.6,0-46.93-19.2-46.93-46.93s19.2-44.8,46.93-44.8,46.93,19.2,46.93,46.93-21.33,44.8-46.93,44.8ZM183.47,132.27l-46.93,46.93c-2.13,4.27-6.4,4.27-10.67,4.27s-8.53-2.13-10.67-4.27l-23.47-23.47c-6.4-4.27-6.4-14.93,0-21.33s14.93-6.4,21.33,0l12.8,12.8,36.27-36.27c6.4-6.4,14.93-6.4,21.33,0s6.4,14.93,0,21.33ZM409.6,375.47h-183.47c-8.53,0-14.93-6.4-14.93-14.93s6.4-14.93,14.93-14.93h183.47c8.53,0,14.93,6.4,14.93,14.93s-6.4,14.93-14.93,14.93ZM409.6,268.8h-183.47c-8.53,0-14.93-6.4-14.93-14.93s6.4-14.93,14.93-14.93h183.47c8.53,0,14.93,6.4,14.93,14.93s-6.4,14.93-14.93,14.93ZM409.6,162.13h-183.47c-8.53,0-14.93-6.4-14.93-14.93s6.4-14.93,14.93-14.93h183.47c8.53,0,14.93,6.4,14.93,14.93s-6.4,14.93-14.93,14.93Z"/></svg></span>
      <span data-i18n="lists">Lists</span>
    </button>
    <button class="nav-tab" onclick="location.href='profile.html'">
      <span class="nav-icon"><svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" fill="currentColor" width="26" height="26"><ellipse cx="256" cy="122.8" rx="104.4" ry="114.8"/><path d="M471.1,430.9c-30.4-89.6-115.2-154-215.1-154s-184.7,64.4-215.1,154c-12.2,35.9,14.3,73.1,52.1,73.1h326c37.9,0,64.3-37.2,52.1-73.1Z"/></svg></span>
      <span data-i18n="profile">Profile</span>
    </button>
  </nav>
</div>

<!-- Add pill (fixed) -->
<div class="add-pill" id="add-pill">
  <button class="add-pill-main" onclick="toggleAddPanel()" data-i18n="add">+ Add</button>
</div>

<!-- Add panel (expanded) -->
<div class="add-panel hidden" id="add-panel">
  <div style="display:flex;gap:8px;align-items:center">
    <input class="input" type="text" id="item-input" style="flex:1"
           data-i18n-placeholder="itemName" placeholder="Escribe un artículo..."
           onkeydown="if(event.key==='Enter') addItem()"/>
    <button class="btn btn-brand" onclick="addItem()" id="btn-add-item" data-i18n="add">+ Add</button>
    <button onclick="closeAddPanel()" style="background:none;border:none;color:var(--text-3);font-size:1.4rem;cursor:pointer;padding:4px 6px;line-height:1;flex-shrink:0">✕</button>
  </div>
  <div style="display:flex;gap:8px">
    <select class="input" id="item-cat" style="flex:2"></select>
    <input class="input" type="text" id="item-qty" style="flex:1;min-width:80px"
           data-i18n-placeholder="quantity" placeholder="Cantidad" maxlength="20"/>
  </div>
</div>

<!-- Action bar (long press) -->
<div class="action-bar hidden" id="action-bar">
  <button class="action-bar-btn" onclick="clearSelection()">✕</button>
  <span class="action-bar-btn" id="action-bar-info" style="flex:1.5;font-size:var(--fs-sm);font-weight:800;border-left:1px solid rgba(255,255,255,.2)"></span>
  <button class="action-bar-btn" id="btn-action-edit" onclick="editSelected()" data-i18n="edit">Editar</button>
  <button class="action-bar-btn" onclick="copySelectedItems()" data-i18n="copy">Copiar</button>
  <button class="action-bar-btn" onclick="deleteSelectedItems()" data-i18n="delete">Eliminar</button>
</div>

<!-- Modal: edit item -->
<div class="modal-overlay hidden centered" id="modal-edit">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" data-i18n="edit">Editar</div>
    <div class="modal-body">
      <div class="input-group">
        <label class="input-label" data-i18n="itemName">Nombre</label>
        <input class="input" type="text" id="edit-name" maxlength="80"/>
      </div>
      <div class="input-group">
        <label class="input-label" data-i18n="quantity">Cantidad</label>
        <input class="input" type="text" id="edit-qty" maxlength="20"/>
      </div>
      <div class="input-group">
        <label class="input-label" data-i18n="category">Categoría</label>
        <select class="input" id="edit-cat"></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="document.getElementById('modal-edit').classList.add('hidden')" data-i18n="cancel">Cancelar</button>
      <button class="btn btn-brand" onclick="saveEdit()" data-i18n="save">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal: copy to list -->
<div class="modal-overlay hidden centered" id="modal-copy">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" data-i18n="copyTo">Copiar a lista</div>
    <div class="modal-body">
      <div class="input-group">
        <label class="input-label" data-i18n="selectList">Selecciona una lista</label>
        <select class="input" id="copy-list-select"></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="document.getElementById('modal-copy').classList.add('hidden')" data-i18n="cancel">Cancelar</button>
      <button class="btn btn-brand" onclick="confirmCopy()" data-i18n="copy">COPY</button>
    </div>
  </div>
</div>

<!-- Modal: confirm delete item -->
<div class="modal-overlay hidden centered" id="modal-del-item">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" data-i18n="delete">Eliminar</div>
    <div class="modal-body"><p style="font-size:var(--fs-sm);color:var(--text-2)" data-i18n="confirmDelete">¿Eliminar este artículo?</p></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="document.getElementById('modal-del-item').classList.add('hidden')" data-i18n="cancel">Cancelar</button>
      <button class="btn btn-danger" onclick="confirmDeleteItem()" data-i18n="delete">Eliminar</button>
    </div>
  </div>
</div>

<!-- Modal: confirm clear all -->
<div class="modal-overlay hidden centered" id="modal-clear-completed">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" data-i18n="clearCompleted">Limpiar tachados</div>
    <div class="modal-body"><p style="font-size:var(--fs-sm);color:var(--text-2)" data-i18n="confirmClearCompleted">¿Limpiar todos los tachados?</p></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="document.getElementById('modal-clear-completed').classList.add('hidden')" data-i18n="cancel">Cancelar</button>
      <button class="btn btn-danger" onclick="document.getElementById('modal-clear-completed').classList.add('hidden');clearCompleted()" data-i18n="yes">Sí, limpiar</button>
    </div>
  </div>
</div>

<div class="modal-overlay hidden centered" id="modal-clear-all">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" data-i18n="clearAll">Limpiar todo</div>
    <div class="modal-body"><p style="font-size:var(--fs-sm);color:var(--text-2)" data-i18n="confirmClearAll">¿Seguro que quieres limpiar todo?</p></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="document.getElementById('modal-clear-all').classList.add('hidden')" data-i18n="cancel">Cancelar</button>
      <button class="btn btn-danger" onclick="doClearAll()" data-i18n="yes">Sí, limpiar</button>
    </div>
  </div>
</div>

<!-- Modal: invite from list -->
<div class="modal-overlay hidden centered" id="modal-invite">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" data-i18n="invite">Compartir</div>
    <div class="modal-body">
      <div class="input-group">
        <label class="input-label" data-i18n="inviteEmail">Correo</label>
        <input class="input" type="email" id="inv-email" data-i18n-placeholder="inviteEmail" placeholder="Correo a invitar"/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="document.getElementById('modal-invite').classList.add('hidden')" data-i18n="cancel">Cancelar</button>
      <button class="btn btn-brand" id="btn-inv" onclick="sendInvite()"><span data-i18n="sendInvite">Enviar</span></button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<!-- Modal: participantes -->
<div class="modal-overlay hidden centered" id="modal-members">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" data-i18n="members">Participantes</div>
    <div class="modal-body" id="modal-members-list" style="padding:0"></div>
    <div class="modal-footer">
      <button class="btn btn-outline btn-full" onclick="document.getElementById('modal-members').classList.add('hidden')" data-i18n="close">Cerrar</button>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="i18n.js"></script>
<script src="supabase.js"></script>
<script src="list.js?v=1"></script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("./sw.js")
      .catch(function(e) { console.log("SW error:", e); });
  });
}
</script>

<script>
// ── Wake Lock — pantalla siempre encendida ──────────────────────
var _wakeLock = null;

async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  if (localStorage.getItem('screenAwake') !== '1') return;
  try {
    _wakeLock = await navigator.wakeLock.request('screen');
  } catch(e) {
    console.log('Wake Lock no disponible:', e.message);
  }
}

function releaseWakeLock() {
  if (_wakeLock) { _wakeLock.release(); _wakeLock = null; }
}

// Solicitar al cargar, liberar al salir
window.addEventListener('load', requestWakeLock);
window.addEventListener('beforeunload', releaseWakeLock);

// Re-solicitar si el documento vuelve a ser visible (ej. tras bloqueo)
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible') requestWakeLock();
  else releaseWakeLock();
});
</script>
</body>
</html>
